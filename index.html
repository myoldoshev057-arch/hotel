<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AURUM — Luxury Hotel</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════
   DESIGN TOKENS & TELEGRAM THEME INTEGRATION
═══════════════════════════════════════ */
:root {
  /* Asosiy ranglar Telegram theme'dan olinadi, agar bo'lmasa default ranglar ishlaydi */
  --ink:       var(--tg-theme-text-color, #0c0b09);
  --ink2:      var(--tg-theme-secondary-bg-color, #1a1814);
  --paper:     var(--tg-theme-bg-color, #f6f2eb);
  --paper2:    var(--tg-theme-secondary-bg-color, #ede8df);
  --muted:     var(--tg-theme-hint-color, #8a8278);
  --gold:      #b8953f;
  --gold-pale: #e8d9b5;
  --white:     var(--tg-theme-bg-color, #ffffff);
  --radius:    8px;
  --shadow:    0 2px 8px rgba(0,0,0,0.08);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Sora', sans-serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.container { padding: 1.5rem; }

/* Typography */
.t-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 500; color: var(--ink); margin-bottom: 0.5rem; }
.t-sub { font-size: 14px; color: var(--muted); font-weight: 300; margin-bottom: 1.5rem; }
.t-tag { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); }

/* Rooms Grid (Mobile Optimized) */
.rooms-grid { display: grid; gap: 1rem; margin-bottom: 2rem; }
.room-card {
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid rgba(184,149,63,0.1);
}
.rc-img {
  height: 160px;
  background: linear-gradient(135deg, #1c1a14, #0f0d0a);
  display: flex; align-items: flex-end; padding: 1rem;
  position: relative;
}
.rc-img::after { content: 'AURUM'; position: absolute; top:50%; left:50%; transform: translate(-50%,-50%); color: rgba(184,149,63,0.1); font-family: 'Playfair Display', serif; font-size: 3rem; font-style: italic; }
.rc-body { padding: 1rem; }
.rc-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 0.3rem; }
.rc-price { color: var(--gold); font-weight: 600; font-size: 1.1rem; }
.rc-btn {
  width: 100%; margin-top: 1rem; padding: 0.8rem;
  background: transparent; border: 1px solid var(--gold); color: var(--gold);
  border-radius: var(--radius); font-weight: 600; font-family: inherit;
}

/* Booking Form */
.form-card { background: var(--white); padding: 1.5rem; border-radius: var(--radius); box-shadow: var(--shadow); }
.fg-group { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 5px; }
.fg-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
.fg-input {
  background: var(--paper); border: 1px solid var(--paper2);
  color: var(--ink); padding: 0.9rem; font-size: 14px;
  border-radius: var(--radius); outline: none; width: 100%;
  font-family: inherit;
}
.fg-input:focus { border-color: var(--gold); }
.btn-primary {
  width: 100%; background: var(--gold); color: #fff; border: none;
  padding: 1rem; font-size: 14px; font-weight: 600;
  border-radius: var(--radius); text-transform: uppercase; letter-spacing: 0.05em;
}
.price-preview { background: rgba(184,149,63,0.1); padding: 1rem; border-radius: var(--radius); margin: 1rem 0; display: none; text-align: center; }
.price-preview.show { display: block; }
.pp-total { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); font-weight: 600; }
</style>
</head>
<body>

<div class="container">
  <div style="text-align:center; margin-bottom: 2rem;">
    <h1 style="font-family:'Playfair Display', serif; font-size:2rem; letter-spacing:0.2em;">AUR<span style="color:var(--gold);">U</span>M</h1>
    <p style="font-size:12px; color:var(--muted); letter-spacing:0.1em;">LUXURY HOTEL</p>
  </div>

  <h2 class="t-title">Xona tanlang</h2>
  <p class="t-sub">Mini ilova orqali tezkor bron qiling.</p>

  <div class="rooms-grid">
    <div class="room-card">
      <div class="rc-img"><span class="t-tag" style="color:#fff; z-index:10;">Deluxe King</span></div>
      <div class="rc-body">
        <div class="rc-name">Deluxe King Room</div>
        <div class="rc-price">$280 / kecha</div>
        <button class="rc-btn" onclick="selectRoom('deluxe_king')">Tanlash</button>
      </div>
    </div>
    <div class="room-card">
      <div class="rc-img"><span class="t-tag" style="color:#fff; z-index:10;">Twin Suite</span></div>
      <div class="rc-body">
        <div class="rc-name">Luxury Twin Suite</div>
        <div class="rc-price">$420 / kecha</div>
        <button class="rc-btn" onclick="selectRoom('luxury_twin')">Tanlash</button>
      </div>
    </div>
  </div>

  <div class="form-card" id="bookingFormSection">
    <h3 class="t-title" style="font-size:1.4rem; margin-bottom:1rem;">Bron ma'lumotlari</h3>
    <form id="bookForm" onsubmit="submitBook(event)">
      <div class="fg-group">
        <label class="fg-label">Xona turi</label>
        <select name="room_type" id="fi_room" class="fg-input" required>
          <option value="" disabled selected>Xona tanlang...</option>
          <option value="deluxe_king">Deluxe King Room ($280)</option>
          <option value="luxury_twin">Luxury Twin Suite ($420)</option>
          <option value="presidential">Presidential Suite ($1200)</option>
        </select>
      </div>
      
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="fg-group">
          <label class="fg-label">Kelish</label>
          <input type="date" name="check_in" id="fi_checkin" class="fg-input" required>
        </div>
        <div class="fg-group">
          <label class="fg-label">Ketish</label>
          <input type="date" name="check_out" id="fi_checkout" class="fg-input" required>
        </div>
      </div>

      <div class="fg-group">
        <label class="fg-label">Ism Familiya</label>
        <input type="text" name="full_name" id="fi_name" class="fg-input" placeholder="Ismingiz" required>
      </div>
      <div class="fg-group">
        <label class="fg-label">Telefon / Username</label>
        <input type="text" name="phone" id="fi_phone" class="fg-input" placeholder="+998 90 123 45 67" required>
      </div>

      <div class="price-preview" id="pricePreview">
        <div style="font-size:12px; color:var(--muted);">Jami hisob:</div>
        <div class="pp-total" id="ppTotal"></div>
      </div>

      <button type="submit" class="btn-primary" id="bookBtn">Tasdiqlash</button>
    </form>
  </div>
</div>

<script>
// ── TELEGRAM WEB APP INIT ──
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

// Auto-fill user data from Telegram
if(tg.initDataUnsafe?.user) {
    const user = tg.initDataUnsafe.user;
    document.getElementById('fi_name').value = `${user.first_name || ''} ${user.last_name || ''}`.trim();
    document.getElementById('fi_phone').value = user.username ? `@${user.username}` : '';
}

// ── CONFIG ──
// DIQQAT: O'zingizning backend serveringiz URL manzilini shu yerga yozing!
const API_BASE = 'https://sizning-backend-domeningiz.com'; 
const PRICES = { deluxe_king:280, luxury_twin:420, presidential:1200 };

const today = new Date().toISOString().split('T')[0];
document.getElementById('fi_checkin').min = today;

function triggerHaptic() {
    if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

document.querySelectorAll('button, select, input').forEach(el => {
    el.addEventListener('click', triggerHaptic);
});

function selectRoom(type) {
  document.getElementById('fi_room').value = type;
  document.getElementById('bookingFormSection').scrollIntoView({ behavior: 'smooth' });
  updatePricePreview();
}

['fi_checkin', 'fi_checkout', 'fi_room'].forEach(id => {
  document.getElementById(id).addEventListener('change', updatePricePreview);
});

function updatePricePreview() {
  const ci = document.getElementById('fi_checkin').value;
  const co = document.getElementById('fi_checkout').value;
  const rt = document.getElementById('fi_room').value;
  const prev = document.getElementById('pricePreview');
  
  if (!ci || !co || !rt) { prev.classList.remove('show'); return; }
  
  const nights = Math.max(1, Math.round((new Date(co)-new Date(ci))/(86400000)));
  const total  = (PRICES[rt]||0) * nights;
  
  document.getElementById('ppTotal').textContent = `$${total.toLocaleString()}`;
  prev.classList.add('show');
}

async function submitBook(e) {
  e.preventDefault();
  triggerHaptic();
  
  const form = e.target;
  const btn = document.getElementById('bookBtn');
  const data = Object.fromEntries(new FormData(form));
  
  // Ism va familiyani ajratish (backend kutgan format uchun)
  const nameParts = data.full_name.split(' ');
  data.first_name = nameParts[0] || 'Unknown';
  data.last_name = nameParts.slice(1).join(' ') || '';
  data.email = data.phone.includes('@') ? `${data.phone.replace('@','')}@telegram.uz` : 'telegram@user.uz'; // Default email agar yo'q bo'lsa

  btn.textContent = 'Yuborilmoqda...';
  btn.disabled = true;

  try {
    const resp = await fetch(`${API_BASE}/api/bookings`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    
    const result = await resp.json();

    if (result.success) {
      tg.showAlert("Tabriklaymiz! Xona muvaffaqiyatli band qilindi. Menejerimiz tez orada aloqaga chiqadi.");
      tg.HapticFeedback.notificationOccurred('success');
      setTimeout(() => tg.close(), 3000); // Mini appni yopish
    } else {
      tg.showAlert("Xatolik: " + (result.message || "Ma'lumotlarni tekshiring"));
      tg.HapticFeedback.notificationOccurred('error');
      btn.textContent = 'Tasdiqlash';
      btn.disabled = false;
    }
  } catch(error) {
     tg.showAlert("Server bilan bog'lanishda xatolik yuz berdi. Iltimos keyinroq urinib ko'ring.");
     tg.HapticFeedback.notificationOccurred('error');
     btn.textContent = 'Tasdiqlash';
     btn.disabled = false;
  }
}
</script>
</body>
</html>
